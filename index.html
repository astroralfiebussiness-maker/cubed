<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubed - 3D Voxel Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #1a1a1a;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            z-index: 100;
        }

        #hud h3 {
            color: #00ff00;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
        }

        #hud p {
            margin: 5px 0;
            color: #00ff00;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            z-index: 100;
            max-width: 300px;
        }

        #controls h4 {
            color: #00ffff;
            margin-bottom: 8px;
        }

        #controls p {
            margin: 3px 0;
            color: #00ff00;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0, 255, 0, 0.7);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #00ff00;
            border-radius: 10px;
            text-align: center;
            z-index: 300;
        }

        #fps {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading">CUBED<br><span style="font-size: 14px;">Generating world...</span></div>
    <div id="gameContainer"></div>
    <div id="crosshair"></div>
    <div id="hud">
        <h3>CUBED</h3>
        <p>X: <span id="posX">0</span></p>
        <p>Y: <span id="posY">0</span></p>
        <p>Z: <span id="posZ">0</span></p>
        <p>Block: <span id="blockType">Empty</span></p>
    </div>
    <div id="fps">FPS: <span id="fpsValue">0</span></div>
    <div id="controls">
        <h4>CONTROLS</h4>
        <p><b>WASD</b> - Move</p>
        <p><b>SPACE</b> - Up</p>
        <p><b>SHIFT</b> - Down</p>
        <p><b>MOUSE</b> - Look</p>
        <p><b>LEFT</b> - Break</p>
        <p><b>RIGHT</b> - Place</p>
        <p><b>1-5</b> - Block</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/terrain.js"></script>
    <script src="js/player.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

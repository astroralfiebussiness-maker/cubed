<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubed - 3D Voxel Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            z-index: 100;
            max-width: 300px;
        }

        #hud h3 {
            color: #00ff00;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ff00;
        }

        #hud p {
            margin: 5px 0;
            color: #00ff00;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            z-index: 100;
            max-width: 400px;
        }

        #controls h4 {
            color: #00ffff;
            margin-bottom: 8px;
        }

        #controls p {
            margin: 3px 0;
            color: #00ff00;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }

        .crosshair-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 0, 0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #blockInfo {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            z-index: 100;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border: 2px solid #00ff00;
            border-radius: 10px;
            text-align: center;
            z-index: 200;
            display: none;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #00ff00;
            border-radius: 10px;
            text-align: center;
            z-index: 300;
        }
    </style>
</head>
<body>
    <div id="loading">
        Generating world...
        <div style="font-size: 12px; margin-top: 20px;">CUBED</div>
    </div>
    
    <div id="crosshair">
        <div class="crosshair-dot"></div>
    </div>

    <div id="hud">
        <h3>CUBED</h3>
        <p>Position: <span id="posX">0</span>, <span id="posY">0</span>, <span id="posZ">0</span></p>
        <p>Block: <span id="blockType">Empty</span></p>
        <p>Looking at: <span id="lookingAt">Nothing</span></p>
        <p>FPS: <span id="fps">60</span></p>
    </div>

    <div id="blockInfo">
        <h3>Block Info</h3>
        <p id="blockName">None</p>
    </div>

    <div id="controls">
        <h4>CONTROLS</h4>
        <p><b>WASD</b> - Move</p>
        <p><b>SPACE</b> - Jump/Up</p>
        <p><b>SHIFT</b> - Down</p>
        <p><b>MOUSE</b> - Look around</p>
        <p><b>LEFT CLICK</b> - Break block</p>
        <p><b>RIGHT CLICK</b> - Place block</p>
        <p><b>1-5</b> - Select block type</p>
        <p><b>S</b> - Save game</p>
        <p><b>L</b> - Load game</p>
    </div>

    <div id="message"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/terrain.js"></script>
    <script src="js/player.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
